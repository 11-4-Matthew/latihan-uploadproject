    <style>
        body{

        .container{

        }
        .box{
            width: 220px;
            height: 180px;
            display: flex;
            justify-content: center; /*horizontal*/

            border: 5px solid black
        }
        .box img{
            width:150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
        }
        .judul{
            text-align: center;
            font-size: 30px;
            margin-bottom: 20px;
        }
    </style>
</head>
